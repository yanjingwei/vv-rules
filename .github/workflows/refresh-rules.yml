name: refresh-rules

on:
  schedule:
    - cron: '17 18 * * *'   # 每日 ~02:17 CST 从上游刷新
  workflow_dispatch: {}      # 支持手动触发（首次填充规则用它）

permissions:
  contents: write

concurrency:
  group: refresh-rules
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream rule lists
        run: bash scripts/fetch-rules.sh

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules/
          if git diff --cached --quiet; then
            echo "no rule changes"
          else
            git commit -m "chore: refresh rules ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
